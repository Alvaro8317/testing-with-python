name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  django-tests:
    name: Django Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 11-extras/8-testing-with-django

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: 11-extras/8-testing-with-django/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

  fastapi-tests:
    name: FastAPI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 11-extras/9-testing-with-fastapi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: 11-extras/9-testing-with-fastapi/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v