[pytest]
minversion = 6.0
addopts = -ra -q
testpaths = tests
markers =
    jewelry: tests related to the jewelry store application
    computer: tests related to the computer assembly application
    happy_path: tests covering the expected successful flow
    edge_case: tests covering boundary values and unexpected inputs
    pricing: tests related to price calculations and discounts
    inventory: tests related to inventory and stock management
    compatibility: tests related to component compatibility
    power: tests related to PSU and power calculations
    validation: tests related to Pydantic model validations
